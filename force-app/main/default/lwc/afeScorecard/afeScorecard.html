<template>
    <lightning-card title="Evaluation Scorecard" icon-name="standard:evaluation">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium quick-action-body">
            <template if:true={isLoading}>
                <div class="slds-is-relative loading-container">
                    <lightning-spinner alternative-text="Loading scorecard" size="small"></lightning-spinner>
                </div>
            </template>
            <template if:true={isContextScreen}>
                <section class="summary-panel slds-m-bottom_medium" aria-label="Evaluation summary">
                    <div class="slds-grid slds-wrap slds-gutters_small slds-grid_vertical-align-center">
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                            <p class="summary-label">Overall Score</p>
                            <p class="summary-value" title="Overall weighted score">
                                <template if:true={hasWeightedTotal}>
                                    <lightning-formatted-number
                                        value={weightedTotal}
                                        minimum-fraction-digits="2"
                                        maximum-fraction-digits="2"
                                    ></lightning-formatted-number>
                                </template>
                                <template if:false={hasWeightedTotal}>--</template>
                            </p>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2 summary-right">
                            <span class={recommendationBadgeClass} title="Final recommendation">
                                Recommendation: {recommendationLabel}
                            </span>
                            <p class="summary-meta slds-m-top_x-small">
                                <span>Created: </span>
                                <lightning-formatted-date-time
                                    value={createdDate}
                                    year="numeric"
                                    month="short"
                                    day="2-digit"
                                ></lightning-formatted-date-time>
                                <template if:true={hasStatusField}>
                                    <span class="slds-m-left_medium">Status: {statusValue}</span>
                                </template>
                            </p>
                        </div>
                    </div>
                </section>

                <section class="context-panel slds-m-bottom_medium" aria-label="Application context">
                    <h2 class="context-title slds-text-heading_small">Application Context</h2>

                    <div class="context-section slds-m-top_small">
                        <p class="context-section-title">Funding Opportunity</p>
                        <div class="context-body context-body-no-indent slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                <p class="context-label">Name</p>
                                <p class="context-value">{fundingName}</p>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                <p class="context-label">Program Minimum Funding Amount</p>
                                <p class="context-value">
                                    <template if:true={hasFundingProgramMin}>
                                        <lightning-formatted-number
                                            value={fundingProgramMin}
                                            format-style="currency"
                                            currency-code="USD"
                                        ></lightning-formatted-number>
                                    </template>
                                    <template if:false={hasFundingProgramMin}>--</template>
                                </p>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                <p class="context-label">Program Maximum Funding Amount</p>
                                <p class="context-value">
                                    <template if:true={hasFundingProgramMax}>
                                        <lightning-formatted-number
                                            value={fundingProgramMax}
                                            format-style="currency"
                                            currency-code="USD"
                                        ></lightning-formatted-number>
                                    </template>
                                    <template if:false={hasFundingProgramMax}>--</template>
                                </p>
                            </div>
                        </div>
                    </div>

                    <div class="context-section slds-m-top_small">
                        <p class="context-section-title">Application Form</p>
                        <div class="context-body context-body-no-indent slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <p class="context-label">Name</p>
                                <p class="context-value">
                                    <template if:true={hasApplicationFormName}>{applicationFormName}</template>
                                    <template if:false={hasApplicationFormName}>--</template>
                                </p>
                            </div>
                            <div class="slds-col slds-size_1-of-1">
                                <p class="context-label">Purpose</p>
                                <div class="context-rich-text">
                                    <template if:true={applicationFormPurpose}>
                                        <lightning-formatted-rich-text value={applicationFormPurpose}></lightning-formatted-rich-text>
                                    </template>
                                    <template if:false={applicationFormPurpose}>--</template>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-1">
                                <p class="context-label">Application Summary</p>
                                <div class="context-rich-text">
                                    <template if:true={applicationFormSummary}>
                                        <lightning-formatted-rich-text value={applicationFormSummary}></lightning-formatted-rich-text>
                                    </template>
                                    <template if:false={applicationFormSummary}>--</template>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                <p class="context-label">Requested Amount</p>
                                <p class="context-value">
                                    <template if:true={hasApplicationFormRequestedAmount}>
                                        <lightning-formatted-number
                                            value={applicationFormRequestedAmount}
                                            format-style="currency"
                                            currency-code="USD"
                                        ></lightning-formatted-number>
                                    </template>
                                    <template if:false={hasApplicationFormRequestedAmount}>--</template>
                                </p>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                <p class="context-label">Stage</p>
                                <p class="context-value">
                                    <template if:true={hasApplicationFormStage}>{applicationFormStage}</template>
                                    <template if:false={hasApplicationFormStage}>--</template>
                                </p>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                <p class="context-label">Type</p>
                                <p class="context-value">
                                    <template if:true={hasApplicationFormType}>{applicationFormType}</template>
                                    <template if:false={hasApplicationFormType}>--</template>
                                </p>
                            </div>
                        </div>
                    </div>

                    <div class="context-section slds-m-top_small">
                        <div class="criteria-section-header">
                            <p class="context-section-title">Scored Criteria and Rationale</p>
                            <span class="criteria-count-badge">{scoredCriteriaRows.length}</span>
                        </div>

                        <template if:true={hasScoredCriteriaRows}>
                            <div class="criteria-list slds-m-top_small">
                                <template for:each={scoredCriteriaRows} for:item="item">
                                    <article key={item.id} class="criteria-card">
                                        <div class="criteria-card-top">
                                            <div class="criteria-card-headline">
                                                <p class="criteria-title">{item.criterionLabel}</p>
                                                <p class="criteria-subtitle">{item.sectionName} · {item.weightDisplay}</p>
                                            </div>
                                            <span class="score-chip">Score: {item.finalScoreDisplay}</span>
                                        </div>
                                        <div class="criteria-rationale">
                                            <template if:true={item.hasRationale}>
                                                <lightning-formatted-rich-text value={item.rationaleDisplay}></lightning-formatted-rich-text>
                                            </template>
                                            <template if:false={item.hasRationale}>
                                                {item.rationaleDisplay}
                                            </template>
                                        </div>
                                    </article>
                                </template>
                            </div>
                        </template>

                        <template if:false={hasScoredCriteriaRows}>
                            <p class="criteria-empty-message slds-m-top_small">
                                No scored criteria yet. Enter scores on the scoring screen to populate this summary.
                            </p>
                        </template>
                    </div>
                </section>

                <div class="slds-grid slds-grid_align-end">
                    <lightning-button
                        variant="brand"
                        label="Next: Score Application"
                        title="Continue to scoring"
                        onclick={goToScoringScreen}
                    ></lightning-button>
                </div>
            </template>

            <template if:true={isScoringScreen}>
                <section class="scoring-shell">
                    <header class="scoring-header">
                        <div>
                            <p class="build-tag">UI Build: 2026-03-01.3 · Developed by Russ Evans</p>
                            <div class="scoring-title-row">
                                <h2 class="scoring-title">Evaluation Criteria</h2>
                                <template if:true={hasAnyAiGeneratedRows}>
                                    <span class="ai-header-badge">
                                        <lightning-icon
                                            icon-name="utility:einstein"
                                            size="xx-small"
                                            alternative-text="AI assisted"
                                        ></lightning-icon>
                                        <span>AI Assisted</span>
                                    </span>
                                </template>
                            </div>
                            <p class="scoring-subtitle">
                                Review each criterion, compare AI guidance, and finalize reviewer scores with rationale.
                            </p>
                        </div>
                        <div class="ai-toolbar">
                            <lightning-combobox
                                name="aiMode"
                                label="AI Review Mode"
                                value={aiMode}
                                options={aiModeOptions}
                                onchange={handleAiModeChange}
                            ></lightning-combobox>
                            <lightning-button
                                variant="brand"
                                label="Run AI Evaluation"
                                title="Generate AI suggestions for all criteria"
                                onclick={handleGenerateAllSuggestions}
                                disabled={isAiAllDisabled}
                            ></lightning-button>
                        </div>
                    </header>

                    <p class="ai-helper-text slds-m-bottom_medium">
                        AI suggestions are provided to assist reviewers. Final scoring decisions remain with the assigned reviewer.
                    </p>
                    <div class="heatmap-legend" aria-label="Criterion score strength legend">
                        <span class="legend-title">Score Strength</span>
                        <span class="legend-badge score-1">Weak</span>
                        <span class="legend-badge score-2">Below Average</span>
                        <span class="legend-badge score-3">Neutral</span>
                        <span class="legend-badge score-4">Strong</span>
                        <span class="legend-badge score-5">Excellent</span>
                    </div>

                    <div class="table-shell" role="region" aria-label="Evaluation criteria table">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered score-table-fixed">
                            <thead>
                                <tr>
                                    <th scope="col" class="col-bundle">Bundle</th>
                                    <th scope="col" class="col-criterion">Criterion</th>
                                    <th scope="col" class="col-weight">Weight</th>
                                    <th scope="col" class="col-ai">AI Suggestion</th>
                                    <th scope="col" class="col-score">Reviewer Score</th>
                                    <th scope="col" class="col-rationale">Rationale</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={rows} for:item="row">
                                    <tr key={row.id} class={row.scoreHeatClass} aria-label={row.scoreHeatAriaLabel}>
                                        <td class="col-bundle">
                                            <span class="bundle-pill" title={row.sectionName}>{row.sectionName}</span>
                                        </td>
                                        <td class="col-criterion">
                                            <div class="criterion-cell-title">{row.label}</div>
                                        </td>
                                        <td class="col-weight">
                                            <span class="weight-badge">{row.weightDisplay}</span>
                                        </td>
                                        <td class="col-ai">
                                            <span class="ai-pill-wrap">
                                                <span class={row.aiSuggestionDotClass} aria-label={row.scoreHeatAriaLabel}></span>
                                                <span class="ai-pill">{row.suggestedScoreDisplay}</span>
                                            </span>
                                        </td>
                                        <td class="col-score">
                                            <lightning-input
                                                type="number"
                                                variant="label-hidden"
                                                name={row.id}
                                                data-id={row.id}
                                                value={row.finalScoreInput}
                                                min="0"
                                                max="5"
                                                step="1"
                                                label={row.finalScoreLabel}
                                                title={row.finalScoreTitle}
                                                oninput={handleScoreChange}
                                                onchange={handleScoreChange}
                                            ></lightning-input>
                                        </td>
                                        <td class="col-rationale">
                                            <template if:true={row.aiGenerated}>
                                                <div class="ai-label">
                                                    <lightning-icon
                                                        icon-name="utility:einstein"
                                                        size="xx-small"
                                                        alternative-text="AI assisted suggestion"
                                                    ></lightning-icon>
                                                    <span>AI Suggested Rationale</span>
                                                </div>
                                            </template>
                                            <lightning-textarea
                                                class="rationale-editor"
                                                data-id={row.id}
                                                label={row.rationaleLabel}
                                                title={row.rationaleTitle}
                                                value={row.rationaleInput}
                                                placeholder="Describe the rationale for the assigned score..."
                                                oninput={handleRationaleChange}
                                                onchange={handleRationaleChange}
                                            ></lightning-textarea>
                                            <template if:true={row.hasAiCitations}>
                                                <div class="evidence-block">
                                                    <p class="evidence-label">AI Referenced Application Evidence</p>
                                                    <template for:each={row.aiCitationItems} for:item="citation">
                                                        <blockquote key={citation.key} class="evidence-quote">
                                                            "{citation.text}"
                                                        </blockquote>
                                                    </template>
                                                </div>
                                            </template>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <div class="scoring-actions slds-m-top_large">
                        <lightning-button
                            variant="neutral"
                            label="Back to Context"
                            title="Go back to application context"
                            onclick={goToContextScreen}
                        ></lightning-button>
                        <lightning-button
                            variant="brand"
                            label="Save Scores"
                            title="Save updated final scores"
                            onclick={handleSave}
                            disabled={isSaveDisabled}
                        ></lightning-button>
                    </div>
                </section>
            </template>
        </div>
    </lightning-card>
</template>
