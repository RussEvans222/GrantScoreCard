<template>
    <section class="workspace-shell">
        <header class="workspace-header slds-p-around_medium">
            <div class="title-wrap">
                <lightning-icon icon-name="utility:custom_apps" size="small" alternative-text="App"></lightning-icon>
                <div>
                    <h1>Public Sector Grantmaking</h1>
                    <p>Grantmaking operations workspace with process data, evaluations, and insights.</p>
                </div>
            </div>
            <lightning-button-icon
                class="refresh-button"
                icon-name="utility:refresh"
                alternative-text="Refresh"
                title="Refresh"
                onclick={handleRefresh}
                disabled={isRefreshing}>
            </lightning-button-icon>
        </header>

        <div class="slds-p-around_medium">
            <div class="slds-grid slds-wrap slds-gutters metrics-grid">
                <template for:each={metricCards} for:item="metric">
                    <div key={metric.label} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-5">
                        <article class="metric-card">
                            <p class="metric-label">{metric.label}</p>
                            <p class="metric-value">{metric.value}</p>
                        </article>
                    </div>
                </template>
            </div>

            <div class="slds-grid slds-wrap slds-gutters slds-m-top_medium">
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <lightning-card title="Quick Open" icon-name="utility:forward_up">
                        <div class="slds-p-around_medium action-grid">
                            <lightning-button label="Funding Opportunities" data-api="PSG_Funding_Opportunities" onclick={handleOpenTab}></lightning-button>
                            <lightning-button label="Application Forms" data-api="PSG_Application_Forms" onclick={handleOpenTab}></lightning-button>
                            <lightning-button label="Evaluations" data-api="PSG_Evaluations" onclick={handleOpenTab}></lightning-button>
                            <lightning-button label="Evaluation Templates" data-api="PSG_Evaluation_Templates" onclick={handleOpenTab}></lightning-button>
                            <lightning-button label="Criteria Library" data-api="PSG_Criteria_Library" onclick={handleOpenTab}></lightning-button>
                        </div>
                    </lightning-card>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <lightning-card title="Recent Application Forms" icon-name="utility:form">
                        <div class="slds-p-around_medium">
                            <template if:true={recentApplicationForms.length}>
                                <template for:each={recentApplicationForms} for:item="row">
                                    <div key={row.recordId} class="list-row">
                                        <button class="row-link" data-id={row.recordId} data-object="ApplicationForm" onclick={handleOpenRecord}>{row.recordName}</button>
                                        <span>{row.status}</span>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </lightning-card>
                </div>
            </div>

            <div class="slds-grid slds-wrap slds-gutters slds-m-top_medium">
                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <lightning-card title="Recent Evaluations" icon-name="utility:insights">
                        <div class="slds-p-around_medium">
                            <template if:true={recentEvaluations.length}>
                                <template for:each={recentEvaluations} for:item="row">
                                    <div key={row.recordId} class="list-row">
                                        <button class="row-link" data-id={row.recordId} data-object="ApplicationFormEvaluation" onclick={handleOpenRecord}>{row.recordName}</button>
                                        <span>{row.status}</span>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </lightning-card>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                    <lightning-card title="Tableau Dashboard" icon-name="utility:dashboard">
                        <div class="slds-p-around_medium">
                            <template if:true={hasTableauUrl}>
                                <iframe
                                    class="tableau-frame"
                                    src={data.tableauEmbedUrl}
                                    title="Tableau Dashboard"
                                    loading="lazy">
                                </iframe>
                            </template>
                            <template if:false={hasTableauUrl}>
                                <div class="helper-panel">
                                    Configure label <code>PSG_Tableau_Home_Dashboard_URL</code> with an embeddable Tableau URL,
                                    then allow the domain in CSP Trusted Sites.
                                </div>
                            </template>
                        </div>
                    </lightning-card>
                </div>
            </div>

            <p class="helper-note slds-m-top_small">{data.helperNote}</p>
        </div>
    </section>
</template>
