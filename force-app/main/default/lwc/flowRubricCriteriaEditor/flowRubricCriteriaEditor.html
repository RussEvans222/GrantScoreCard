<template>
    <lightning-card title="Criteria Setup Matrix">
        <div class="slds-p-horizontal_small slds-p-bottom_small">
            <lightning-button
                variant="neutral"
                label="Add Custom Row"
                title="Add custom criterion row"
                onclick={handleAddRow}
            ></lightning-button>
        </div>
        <div class="slds-p-horizontal_small slds-p-bottom_small intro-text">
            <p>Configure scoring for each criterion. Bundle is used only for visual grouping.</p>
        </div>

        <template if:true={validationMessage}>
            <div class="slds-text-color_error slds-p-horizontal_small slds-p-bottom_small">{validationMessage}</div>
        </template>
        <div class="slds-p-horizontal_small slds-p-bottom_small slds-text-title_bold">
            Total Weight: {totalWeight}
        </div>

        <div class="editor-grid">
            <template for:each={rows} for:item="row">
                <div class="editor-row" key={row.localId}>
                    <div class="row-actions">
                        <span class="row-type">{row.rowTypeLabel}</span>
                        <lightning-button-icon
                            data-id={row.localId}
                            icon-name="utility:close"
                            alternative-text="Remove Row"
                            title="Remove Row"
                            onclick={handleRemoveRow}
                        ></lightning-button-icon>
                    </div>

                    <template if:true={row.isCustom}>
                        <lightning-input data-id={row.localId} data-field="Label__c" label="Criterion Name" value={row.Label__c} onchange={handleFieldChange}></lightning-input>
                        <lightning-input data-id={row.localId} data-field="Section_Name__c" label="Bundle" value={row.Section_Name__c} onchange={handleFieldChange}></lightning-input>
                        <lightning-textarea data-id={row.localId} data-field="Description__c" label="Description" value={row.Description__c} onchange={handleFieldChange}></lightning-textarea>
                    </template>

                    <template if:false={row.isCustom}>
                        <lightning-input label="Criterion Name" value={row.Label__c} disabled></lightning-input>
                        <lightning-input label="Bundle" value={row.Section_Name__c} disabled></lightning-input>
                        <lightning-textarea label="Description" value={row.Description__c} disabled></lightning-textarea>
                    </template>

                    <lightning-input data-id={row.localId} data-field="Weight__c" type="number" step="0.01" label="Weight" value={row.Weight__c} onchange={handleFieldChange}></lightning-input>
                    <lightning-input data-id={row.localId} data-field="Display_Order__c" type="number" label="Display Order" value={row.Display_Order__c} onchange={handleFieldChange}></lightning-input>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
